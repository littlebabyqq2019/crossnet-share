<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>CrossNetShare Web</title>
    <style>
        body{font-family:Segoe UI,Microsoft YaHei,sans-serif;margin:0;color:#101828;background:#f6f8fb}
        .top{height:64px;background:#1d3557;color:white;display:flex;align-items:center;gap:16px;padding:0 22px}
        .top h1{font-size:20px;margin:0}
        .search{max-width:600px;display:flex;gap:8px;align-items:center}
        .search input{width:100%;border:0;border-radius:8px;padding:10px}
        .date-filter{display:flex;gap:8px;align-items:center;color:white;font-size:14px}
        .date-filter input[type="date"]{border:0;border-radius:6px;padding:6px;color:#111827}
        .date-filter input[type="date"]:invalid::-webkit-datetime-edit-fields-wrapper{color:transparent}
        .date-filter input[type="date"]:focus::-webkit-datetime-edit-fields-wrapper{color:#111827}
        .top-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
        .btn{border:0;border-radius:8px;padding:10px 14px;cursor:pointer;background:#2563eb;color:white;text-decoration:none;font-size:14px;white-space:nowrap}
        .btn.secondary{background:#e5e7eb;color:#111827}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .layout{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 64px)}
        .list{border-right:1px solid #e4e7ec;background:white;overflow:auto}
        .list-header{padding:10px 14px;border-bottom:2px solid #e4e7ec;background:#f9fafb;display:flex;gap:8px;align-items:center}
        .item{padding:12px 14px;border-bottom:1px solid #eef2f7;cursor:pointer;display:flex;gap:10px;align-items:start}
        .item:hover{background:#eff6ff}
        .item.active{background:#dbeafe}
        .item input[type="checkbox"]{margin-top:4px;width:16px;height:16px;cursor:pointer}
        .item-content{flex:1;min-width:0}
        .name{font-weight:600}
        .meta{font-size:12px;color:#667085;margin-top:4px}
        .preview{display:flex;flex-direction:column;min-width:0}
        .toolbar{background:white;border-bottom:1px solid #e4e7ec;padding:10px;display:flex;gap:8px;align-items:center}
        .frame{flex:1;border:0;background:white;margin:16px;border-radius:10px;box-shadow:0 1px 3px #0000001a}
        .empty{padding:40px;color:#667085;text-align:center}
        .text-preview{white-space:pre-wrap;padding:20px}
        .count{color:#667085;font-size:13px}
    </style>
</head>
<body>
    <div class="top">
        <h1>CrossNetShare Web</h1>
        <div class="search">
            <input id="q" placeholder="输入关键词实时过滤文件">
        </div>
        <div class="date-filter">
            <label>日期筛选:</label>
            <input type="date" id="dateFrom">
            <button class="btn" onclick="selectByDate()">选择</button>
            <button class="btn secondary" onclick="clearDateFilter()">清除</button>
        </div>
        <div class="top-actions">
            <button class="btn" onclick="downloadSelected()" id="batchDownloadBtn" disabled>批量下载</button>
            <a class="btn secondary" href="/api/logout">退出</a>
        </div>
    </div>
    <div class="layout">
        <div class="list">
            <div class="list-header">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                <label for="selectAll" style="flex:1;cursor:pointer">全选 / 全不选</label>
                <span id="count" class="count"></span>
            </div>
            <div id="list">
                <div class="empty">正在加载...</div>
            </div>
        </div>
        <div class="preview">
            <div class="toolbar">
                <strong id="title">请选择文件</strong>
                <button id="download" class="btn" style="display:none" onclick="downloadFile()">下载</button>
                <button id="printBtn" class="btn secondary" style="display:none" onclick="printPreview()">打印</button>
            </div>
            <iframe id="frame" class="frame" srcdoc="<div class='empty'>选择左侧文件后在这里预览</div>"></iframe>
        </div>
    </div>
    <script>
        let files = [], selected = null, selectedIds = new Set();

        async function loadFiles() {
            const r = await fetch('/api/files');
            if (r.status === 401) {
                location.href = '/login';
                return;
            }
            const j = await r.json();
            files = j.files || [];
            files.sort((a, b) => new Date(b.createTime).getTime() - new Date(a.createTime).getTime());
            render();
        }

        function render() {
            const query = document.getElementById('q').value.trim().toLowerCase();
            const filtered = query ? files.filter(f =>
                f.filename.toLowerCase().includes(query) ||
                f.relativePath.toLowerCase().includes(query)
            ) : files;

            document.getElementById('count').textContent = filtered.length + ' / ' + files.length + ' 个文件';
            const listEl = document.getElementById('list');
            listEl.innerHTML = '';

            if (!filtered.length) {
                listEl.innerHTML = '<div class="empty">没有匹配的文件</div>';
                return;
            }

            for (const f of filtered) {
                const div = document.createElement('div');
                div.className = 'item';

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = selectedIds.has(f.id);
                cb.onchange = (e) => {
                    e.stopPropagation();
                    toggleSelect(f.id);
                };
                div.appendChild(cb);

                const content = document.createElement('div');
                content.className = 'item-content';
                content.onclick = () => selectFile(f, div);
                content.innerHTML = '<div class="name">' + escapeHtml(f.filename) + '</div>' +
                    '<div class="meta">' + escapeHtml(f.ownerClient) + ' · ' +
                    escapeHtml(f.relativePath) + ' · ' + escapeHtml(f.humanSize || '') + '</div>' +
                    '<div class="meta">创建时间：' + escapeHtml(f.createTime || '') + '</div>';
                div.appendChild(content);
                listEl.appendChild(div);
            }
            updateBatchButton();
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateBatchButton();
            document.getElementById('selectAll').checked = selectedIds.size === files.length;
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            if (checked) {
                files.forEach(f => selectedIds.add(f.id));
            } else {
                selectedIds.clear();
            }
            render();
        }

        function updateBatchButton() {
            const btn = document.getElementById('batchDownloadBtn');
            btn.disabled = selectedIds.size === 0;
            btn.textContent = '批量下载' + (selectedIds.size > 0 ? ' (' + selectedIds.size + ')' : '');
        }

        function selectByDate() {
            const dateFrom = document.getElementById('dateFrom').value;
            if (!dateFrom) {
                alert('请选择起始日期');
                return;
            }
            const fromTime = new Date(dateFrom).getTime();
            selectedIds.clear();
            files.forEach(f => {
                const createTime = new Date(f.createTime).getTime();
                if (createTime >= fromTime) selectedIds.add(f.id);
            });
            render();
        }

        function clearDateFilter() {
            document.getElementById('dateFrom').value = '';
            selectedIds.clear();
            render();
        }

        function selectFile(f, el) {
            selected = f;
            document.querySelectorAll('.item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('title').textContent = f.filename;
            document.getElementById('download').style.display = 'inline-block';
            document.getElementById('printBtn').style.display = 'inline-block';
            const frameEl = document.getElementById('frame');
            frameEl.removeAttribute('srcdoc');
            frameEl.src = '/api/preview?id=' + encodeURIComponent(f.id);
        }

        function downloadFile() {
            if (selected) location.href = '/api/download?id=' + encodeURIComponent(selected.id);
        }

        async function downloadSelected() {
            if (selectedIds.size === 0) return;
            const ids = Array.from(selectedIds);
            if (ids.length === 1) {
                location.href = '/api/download?id=' + encodeURIComponent(ids[0]);
                return;
            }
            location.href = '/api/batch-download?ids=' + encodeURIComponent(ids.join(','));
        }

        function printPreview() {
            const frameEl = document.getElementById('frame');
            frameEl.contentWindow.focus();
            frameEl.contentWindow.print();
        }

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        document.getElementById('q').addEventListener('input', render);
        loadFiles();
    </script>
</body>
</html>
